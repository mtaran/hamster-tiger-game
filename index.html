<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Hamster &amp; Tiger</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #1a1320;
      color: #eee;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      overflow: hidden;
      height: 100%;
      /* Disable double-tap zoom and tap-and-hold callouts on touch. */
      touch-action: manipulation;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
    }
    #wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;       /* anchor at top, not center */
      width: 100vw;
      height: 100vh;
    }
    canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      background: #2b1f3a;
      box-shadow: 0 0 32px #0008;
      /* Canvas backing is 480x320; scale up preserving 3:2. On
         mobile the controls below take up ~30vh, so cap the height
         accordingly. */
      width: min(100vw, 150vh);
      max-height: 100vh;
      aspect-ratio: 3 / 2;
      flex-shrink: 0;
    }

    /* Touch controls — visible only on coarse-pointer (touch) devices. */
    #touch {
      display: none;
      width: 100vw;
      box-sizing: border-box;
      padding: 16px 16px calc(16px + env(safe-area-inset-bottom, 0px));
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    @media (hover: none) and (pointer: coarse) {
      #touch { display: flex; }
      canvas { width: 100vw; }
    }
    .dpad {
      display: grid;
      grid-template-columns: repeat(3, 60px);
      grid-template-rows: repeat(3, 60px);
      gap: 4px;
    }
    #btn-up    { grid-column: 2; grid-row: 1; }
    #btn-left  { grid-column: 1; grid-row: 2; }
    #btn-right { grid-column: 3; grid-row: 2; }
    #btn-down  { grid-column: 2; grid-row: 3; }
    #btn-fire {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      font-size: 18px;
      letter-spacing: 1px;
      background: #b03020;
      color: #ffe070;
      border: 3px solid #ffe070;
    }
    #touch button {
      font-family: inherit;
      background: #2c213e;
      color: #ffe070;
      border: 2px solid #544770;
      border-radius: 10px;
      font-size: 22px;
      cursor: pointer;
      touch-action: none;          /* prevents the browser from intercepting the gesture */
    }
    #touch button:active { background: #544770; }
  </style>
</head>
<body>
  <div id="wrap">
    <canvas id="game" width="480" height="320"></canvas>
    <div id="touch" aria-hidden="true">
      <div class="dpad">
        <button id="btn-up"    data-key="ArrowUp">▲</button>
        <button id="btn-left"  data-key="ArrowLeft">◀</button>
        <button id="btn-right" data-key="ArrowRight">▶</button>
        <button id="btn-down"  data-key="ArrowDown">▼</button>
      </div>
      <button id="btn-fire" data-key="Space">FIRE</button>
    </div>
  </div>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
